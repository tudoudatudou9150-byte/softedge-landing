<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nubohome | Reset Password</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=18" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top"><span class="brand-mark"></span>Nubohome</a>
      <nav class="desktop-nav" aria-label="Main navigation">
        <a href="index.html#shop">Corner Guards</a>
        <a href="orders.html">Orders</a>
        <a href="tracking.html">Tracking</a>
        <a href="support.html">Support</a>
      </nav>
      <div class="header-actions">
        <a class="support-link" href="login.html">Sign in</a>
        <a class="header-link" href="index.html#shop">Shop now</a>
      </div>
    </header>

    <main class="portal-page">
      <section class="portal-hero">
        <p class="product-kicker">Password help</p>
        <h1>Reset your Nubohome account password.</h1>
        <p>Enter your account email and we will send a secure password reset link.</p>
      </section>

      <section class="portal-form-wrap">
        <form class="portal-form" data-password-reset-request>
          <label for="reset-email">Email</label>
          <input id="reset-email" name="email" type="text" inputmode="email" autocomplete="email" required />
          <button class="button primary" type="submit">Send reset link</button>
          <p class="form-note" data-auth-message aria-live="polite"></p>
          <a class="form-link" href="login.html">Back to sign in</a>
        </form>

        <form class="portal-form hidden" data-password-reset-update>
          <label for="new-password">New password</label>
          <div class="password-field">
            <input id="new-password" name="password" type="password" autocomplete="new-password" minlength="6" required />
            <button class="password-toggle" type="button" data-password-toggle aria-label="Show password">Show</button>
          </div>
          <label for="confirm-password">Confirm password</label>
          <div class="password-field">
            <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required />
            <button class="password-toggle" type="button" data-password-toggle aria-label="Show password">Show</button>
          </div>
          <button class="button primary" type="submit">Save new password</button>
          <p class="form-note" data-auth-message aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=2"></script>
    <script src="analytics.js?v=2"></script>
    <script src="portal.js?v=12"></script>
  </body>
</html>
