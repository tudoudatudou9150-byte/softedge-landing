<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nubohome | Account Login</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=16" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top"><span class="brand-mark"></span>Nubohome</a>
      <nav class="desktop-nav" aria-label="Main navigation">
        <a href="index.html#shop">Corner Guards</a>
        <a href="orders.html">Orders</a>
        <a href="tracking.html">Tracking</a>
        <a href="support.html">Support</a>
      </nav>
      <div class="header-actions">
        <a class="support-link" href="register.html">Create account</a>
        <a class="header-link" href="index.html#shop">Shop now</a>
      </div>
    </header>

    <main class="portal-page">
      <section class="portal-hero">
        <p class="product-kicker">Customer account</p>
        <h1>Sign in to track orders and manage shipping details.</h1>
        <p>Use your Nubohome account to save delivery details and follow order updates.</p>
      </section>

      <section class="portal-form-wrap">
        <form class="portal-form" data-login-form>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="current-password" minlength="6" required />
            <button class="password-toggle" type="button" data-password-toggle aria-label="Show password">Show</button>
          </div>
          <button class="button primary" type="submit">Sign in</button>
          <p class="form-note" data-auth-message aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=2"></script>
    <script src="portal.js?v=4"></script>
  </body>
</html>
