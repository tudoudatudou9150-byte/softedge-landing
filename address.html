<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nubohome | Shipping Address</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=17" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top"><span class="brand-mark"></span>Nubohome</a>
      <nav class="desktop-nav" aria-label="Main navigation">
        <a href="account.html">Account</a>
        <a href="orders.html">Orders</a>
        <a href="tracking.html">Tracking</a>
        <a href="support.html">Support</a>
      </nav>
      <div class="header-actions">
        <a class="header-link" href="index.html#shop">Shop now</a>
      </div>
    </header>

    <main class="portal-page">
      <section class="portal-hero">
        <p class="product-kicker">Shipping details</p>
        <h1>Save the address used for checkout and shipment.</h1>
        <p>Customers can keep their delivery details ready before checkout.</p>
      </section>

      <section class="portal-form-wrap wide">
        <form class="portal-form two-column" data-address-form>
          <label>Full name<input name="fullName" type="text" required /></label>
          <label>Phone<input name="phone" type="tel" required /></label>
          <label>Country / Region<input name="country" type="text" required /></label>
          <label>State / Province<input name="state" type="text" required /></label>
          <label>City<input name="city" type="text" required /></label>
          <label>Postal code<input name="postalCode" type="text" required /></label>
          <label class="full">Address line 1<input name="addressLine1" type="text" required /></label>
          <label class="full">Address line 2<input name="addressLine2" type="text" /></label>
          <button class="button primary" type="submit">Save address</button>
          <p class="form-note" data-form-note></p>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=2"></script>
    <script src="analytics.js?v=1"></script>
    <script src="portal.js?v=12"></script>
  </body>
</html>
